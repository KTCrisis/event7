# ============================================
# event7 — GKE-like local stack
# Placement: docker-compose.gke.yml
# ============================================
# Usage:
#   docker compose -f docker-compose.gke.yml up --build
#
# This simulates the GKE deployment locally:
#   - PostgreSQL instead of Supabase
#   - Redis
#   - Backend (FastAPI)
#   - Frontend (Next.js standalone)
# ============================================

services:

  # --- PostgreSQL (replaces Supabase in GKE mode) ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: event7
      POSTGRES_USER: event7
      POSTGRES_PASSWORD: event7_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event7"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  # --- Apicurio Registry (hosted demo) ---  
  apicurio:
    image: apicurio/apicurio-registry:latest-release
    ports:
      - "8081:8080"
    environment:
      APICURIO_STORAGE_KIND: "mem"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Database provider
      DB_PROVIDER: postgresql
      DATABASE_URL: postgresql://event7:event7_dev_password@postgres:5432/event7

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Auth (disabled for local dev)
      AUTH_ENABLED: "false"

      # Encryption key
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"

      # Hosted Apicurio (internal URL for provisioning)
      HOSTED_APICURIO_URL: http://apicurio:8080

      # CORS
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      apicurio:
        condition: service_healthy
    restart: unless-stopped


  # --- Frontend (Next.js standalone) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
