# ============================================
# event7 — GKE-like local stack
# Placement: docker-compose.gke.yml
# ============================================
# Usage:
#   docker compose -f docker-compose.gke.yml up --build
#
# This simulates the GKE deployment locally:
#   - PostgreSQL instead of Supabase
#   - Redis
#   - Backend (FastAPI)
#   - Frontend (Next.js standalone)
# ============================================

services:

  # --- PostgreSQL (replaces Supabase in GKE mode) ---
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: event7
      POSTGRES_USER: event7
      POSTGRES_PASSWORD: event7_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event7"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Database provider
      DB_PROVIDER: postgresql
      DATABASE_URL: postgresql://event7:event7_dev_password@postgres:5432/event7

      # Redis
      REDIS_URL: redis://redis:6379/0

      # Auth (disabled for local dev)
      AUTH_ENABLED: "false"

      # Encryption key (generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"

      # Schema Registry (your Confluent Cloud or local)
      # CONFLUENT_SR_URL: https://psrc-xxx.europe-west9.gcp.confluent.cloud
      # CONFLUENT_SR_KEY: xxx
      # CONFLUENT_SR_SECRET: xxx

      # Proxy (uncomment for Renault network)
      # HTTPS_PROXY: http://cosmos2.mc2.renault.fr:3128
      # HTTP_PROXY: http://cosmos2.mc2.renault.fr:3128
      # NO_PROXY: localhost,127.0.0.1,postgres,redis

      # CORS
      CORS_ORIGINS: '["http://localhost:3000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Frontend (Next.js standalone) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
